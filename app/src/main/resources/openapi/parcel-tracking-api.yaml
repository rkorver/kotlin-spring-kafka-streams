openapi: 3.1.0
info:
  title: Parcel Tracking API
  description: Query completed parcel journeys.
  version: 0.1.0

paths:
  /parcels/{parcelId}:
    get:
      operationId: getJourney
      summary: Retrieve a completed parcel journey by parcel ID
      parameters:
        - name: parcelId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Journey found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ParcelJourneyResponse'
        '404':
          description: Journey not found

components:
  schemas:
    ParcelJourneyResponse:
      type: object
      required:
        - parcelId
        - trackingCode
        - servicePointId
        - receivedAt
        - sortingCenterId
        - readyForDeliveryAt
        - deliveryCity
        - deliveredAt
        - deliveryType
        - totalDurationMillis
      properties:
        parcelId:
          type: string
        trackingCode:
          type: string
        servicePointId:
          type: string
        receivedAt:
          type: string
        sortingCenterId:
          type: string
        readyForDeliveryAt:
          type: string
        deliveryCity:
          type: string
        deliveredAt:
          type: string
        deliveryType:
          type: string
        totalDurationMillis:
          type: integer
          format: int64
