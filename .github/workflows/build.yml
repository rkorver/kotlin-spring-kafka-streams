name: build

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Maven build & tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Show versions
        run: |
          java -version
          mvn -v
          docker --version

      - name: Build, run tests and verify
        id: mvn
        run: |
          set -o pipefail
          mvn -B -ntp -e -X verify 2>&1 | tee maven-output.log

      - name: Surface failing test output
        if: failure()
        run: |
          echo "## Failing tests" >> "$GITHUB_STEP_SUMMARY"
          shopt -s nullglob globstar
          for f in target/surefire-reports/**/*.txt target/failsafe-reports/**/*.txt; do
            echo "### $f" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            sed -n '1,200p' "$f" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            echo "===== $f =====" ; sed -n '1,200p' "$f" ; echo
          done
          for f in target/surefire-reports/**/TEST-*.xml target/failsafe-reports/**/TEST-*.xml; do
            echo "===== $f ====="
            grep -E '<(failure|error) ' -A 20 "$f" || true
            echo
          done
          echo "## Maven tail" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          tail -n 400 maven-output.log >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Maven log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maven-output
          path: maven-output.log
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload Surefire and Failsafe reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: |
            target/surefire-reports/**
            target/failsafe-reports/**
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload jar
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: parcel-tracking-jar
          path: target/*.jar
          if-no-files-found: ignore
          retention-days: 30
